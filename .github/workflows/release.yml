name: Release

# Cutting a release is just pushing a v* tag (see release.sh): this gates on CI, builds the per-arch
# binaries, publishes the multi-arch image to GHCR, and creates the GitHub release with assets attached.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # ci.yml ran on the push to main; tag-version-check.yml runs on this tag push. Gate the release on
  # both being green for the commit -- poll each, waiting if a tag was pushed before CI finished.
  verify-ci:
    name: Verify CI + tag check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
    steps:
      - name: Wait for the required workflows to pass on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha='${{ github.sha }}'
          for wf in ci.yml tag-version-check.yml; do
            ok=
            for _ in $(seq 1 90); do  # job timeout-minutes is the real ceiling
              run=$(gh api "repos/${{ github.repository }}/actions/workflows/$wf/runs?head_sha=$sha&per_page=1" \
                --jq '.workflow_runs[0] | "\(.status)|\(.conclusion // "")"')
              case "${run%%|*}" in
                completed)
                  if [ "${run##*|}" = success ]; then ok=1; break; fi
                  echo "::error::$wf concluded '${run##*|}' on $sha"; exit 1 ;;
                "") echo "No $wf run for $sha yet; waiting..." ;;
                *)  echo "$wf is '${run%%|*}'; waiting..." ;;
              esac
              sleep 20
            done
            [ -n "$ok" ] || { echo "::error::Timed out waiting for $wf on $sha"; exit 1; }
            echo "$wf passed on $sha."
          done

  binaries:
    name: Binary (${{ matrix.variant }})
    needs: verify-ci
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: linux-amd64
            runner: ubuntu-24.04
            platform: linux
            cc: gcc-14
            cxx: g++-14
            reflector_static: "ON"
          - variant: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux
            cc: gcc-14
            cxx: g++-14
            reflector_static: "ON"
          - variant: linux-armv7
            runner: ubuntu-24.04
            platform: linux
            cc: arm-linux-gnueabihf-gcc-14
            cxx: arm-linux-gnueabihf-g++-14
            reflector_static: "ON"
          - variant: macos-arm64
            runner: macos-15
            platform: macos
            cc: clang
            cxx: clang++
            reflector_static: "OFF"  # macOS has no static libSystem; ships dynamic against the system libs

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake g++-14 gcc-14 ninja-build
          if [ "${{ matrix.variant }}" = linux-armv7 ]; then
            sudo apt-get install -y --no-install-recommends \
              crossbuild-essential-armhf g++-14-arm-linux-gnueabihf gcc-14-arm-linux-gnueabihf
          fi

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: brew list ninja >/dev/null 2>&1 || brew install ninja

      - name: Configure
        run: |
          # armv7 has no native runner: cross-compile via CMAKE_SYSTEM_* (CC/CXX are the cross compilers).
          extra=""
          if [ "${{ matrix.variant }}" = linux-armv7 ]; then
            extra="-D CMAKE_SYSTEM_NAME=Linux -D CMAKE_SYSTEM_PROCESSOR=arm"
          fi
          cmake -S . -B build -G Ninja \
            -D CMAKE_BUILD_TYPE=Release \
            -D BUILD_TESTING=OFF \
            -D REFLECTOR_STATIC="${REFLECTOR_STATIC}" \
            $extra
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          REFLECTOR_STATIC: ${{ matrix.reflector_static }}

      - name: Build
        run: cmake --build build --target reflector_app

      - name: Verify static linking (Linux)
        if: matrix.platform == 'linux'
        run: |
          # `file` reads the ELF header arch-independently, so one check covers amd64/arm64/armv7
          # (ldd cannot introspect a foreign-arch binary).
          file build/reflector
          file build/reflector | grep -q 'statically linked' \
            || { echo "::error::reflector is not statically linked"; exit 1; }

      - name: Stage binary
        run: |
          mkdir -p dist
          cp build/reflector "dist/reflector-${{ github.ref_name }}-${{ matrix.variant }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: reflector-${{ matrix.variant }}
          path: dist/reflector-${{ github.ref_name }}-${{ matrix.variant }}
          if-no-files-found: error

  # Each arch builds on its own native runner (no emulation), pushes by digest, and the manifest job
  # stitches the digests into one multi-arch tag.
  image:
    name: Image (${{ matrix.arch }})
    needs: verify-ci
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          # armv7 has no native runner; it cross-compiles on the amd64 runner via the Dockerfile (no QEMU).
          - arch: armv7
            runner: ubuntu-24.04
            platform: linux/arm/v7

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}.digest"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Image manifest -> GHCR
    needs: image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create and push the manifest list
        working-directory: /tmp/digests
        env:
          REPO: ${{ github.repository }}
          METADATA: ${{ steps.meta.outputs.json }}
        run: |
          mapfile -t tags < <(jq -r '.tags[]' <<< "$METADATA")
          args=()
          for tag in "${tags[@]}"; do args+=(--tag "$tag"); done
          for f in *.digest; do args+=("ghcr.io/${REPO}@sha256:${f%.digest}"); done
          docker buildx imagetools create "${args[@]}"

      - name: Inspect
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: docker buildx imagetools inspect "ghcr.io/${REPO}:${VERSION}"

  release:
    name: GitHub release
    needs: [binaries, manifest]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: reflector-*
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum reflector-* | tee SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/reflector-*
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
