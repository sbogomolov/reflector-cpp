name: Release

# Cutting a release is just pushing a v* tag (see release.sh): this gates on CI, builds the per-arch
# binaries, publishes the multi-arch image to GHCR, and creates the GitHub release with assets attached.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # Fail fast on a version mismatch before the (possibly long) CI wait: check the tag matches the project
  # version first, then gate the release on ci.yml being green for this commit (poll it, waiting if the
  # tag was pushed before CI finished).
  verify-ci:
    name: Verify CI + tag check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
    steps:
      # A version tag must match the project version in CMakeLists.txt, so the git tag, the published
      # image (docker_build.sh reads the same value), and the GitHub release name can never disagree.
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify tag matches CMakeLists version
        run: |
          version="$(./version.sh)"
          expected="v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match CMakeLists version (expected ${expected}). Bump CMakeLists.txt or retag."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches CMakeLists version ${version}."

      - name: Wait for CI to pass on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha='${{ github.sha }}'
          wf=ci.yml
          ok=
          for _ in $(seq 1 90); do  # job timeout-minutes is the real ceiling
            run=$(gh api "repos/${{ github.repository }}/actions/workflows/$wf/runs?head_sha=$sha&per_page=1" \
              --jq '.workflow_runs[0] | "\(.status)|\(.conclusion // "")"')
            case "${run%%|*}" in
              completed)
                if [ "${run##*|}" = success ]; then ok=1; break; fi
                echo "::error::$wf concluded '${run##*|}' on $sha"; exit 1 ;;
              "") echo "No $wf run for $sha yet; waiting..." ;;
              *)  echo "$wf is '${run%%|*}'; waiting..." ;;
            esac
            sleep 20
          done
          [ -n "$ok" ] || { echo "::error::Timed out waiting for $wf on $sha"; exit 1; }
          echo "$wf passed on $sha."

  binaries:
    name: Binary (${{ matrix.variant }})
    needs: verify-ci
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: linux-amd64
            runner: ubuntu-24.04
            platform: linux
            cc: gcc-14
            cxx: g++-14
          - variant: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux
            cc: gcc-14
            cxx: g++-14
          # armv7/armv5 have no native runner: cross-compile on the amd64 runner. cross_packages adds the
          # toolchain; cmake_args drives CMAKE_SYSTEM_* (CC/CXX point at the cross compilers). Same cross-
          # compile setup as ci.yml. armv7 = armhf (hard-float); armv5 = armel (soft-float, EN7562 boxes).
          - variant: linux-armv7
            runner: ubuntu-24.04
            platform: linux
            cc: arm-linux-gnueabihf-gcc-14
            cxx: arm-linux-gnueabihf-g++-14
            cross_packages: crossbuild-essential-armhf g++-14-arm-linux-gnueabihf gcc-14-arm-linux-gnueabihf
            cmake_args: -D CMAKE_SYSTEM_NAME=Linux -D CMAKE_SYSTEM_PROCESSOR=arm
          - variant: linux-armv5
            runner: ubuntu-24.04
            platform: linux
            cc: arm-linux-gnueabi-gcc-14
            cxx: arm-linux-gnueabi-g++-14
            cross_packages: crossbuild-essential-armel g++-14-arm-linux-gnueabi gcc-14-arm-linux-gnueabi
            cmake_args: -D CMAKE_SYSTEM_NAME=Linux -D CMAKE_SYSTEM_PROCESSOR=arm
          - variant: macos-arm64
            runner: macos-15
            platform: macos
            cc: clang
            cxx: clang++

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          # A failing third-party repo (packages.microsoft.com flakes) must not kill the step:
          # the packages come from the Ubuntu archive, and a broken archive still fails the
          # install below loudly.
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends \
            cmake g++-14 gcc-14 ninja-build ${{ matrix.cross_packages }}

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: brew list ninja >/dev/null 2>&1 || brew install ninja

      # Every release binary is static (REFLECTOR_STATIC) except macOS, which has no static libSystem and
      # ships dynamic against the system libs — derive it from the platform.
      - name: Configure
        run: |
          if [ "${{ matrix.platform }}" = macos ]; then static=OFF; else static=ON; fi
          cmake -S . -B build -G Ninja \
            -D CMAKE_BUILD_TYPE=Release \
            -D BUILD_TESTING=OFF \
            -D REFLECTOR_STATIC=$static \
            -D REFLECTOR_STRIP=ON \
            ${{ matrix.cmake_args }}
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Build
        run: cmake --build build --target reflector_app

      - name: Verify static linking (Linux)
        if: matrix.platform == 'linux'
        run: |
          # `file` reads the ELF header arch-independently, so one check covers amd64/arm64/armv7/armv5
          # (ldd cannot introspect a foreign-arch binary).
          file build/reflector
          file build/reflector | grep -q 'statically linked' \
            || { echo "::error::reflector is not statically linked"; exit 1; }

      - name: Stage binary
        run: |
          mkdir -p dist
          cp build/reflector "dist/reflector-${{ github.ref_name }}-${{ matrix.variant }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: reflector-${{ matrix.variant }}
          path: dist/reflector-${{ github.ref_name }}-${{ matrix.variant }}
          if-no-files-found: error

  # FreeBSD has no native runner and Docker can't run a FreeBSD kernel, so build in a VM (vmactions).
  # amd64 is KVM-accelerated; arm64 has no KVM on any GitHub-hosted runner, so it builds emulated on the
  # (measurably faster) amd64 host. Static (REFLECTOR_STATIC) — verified to run across FreeBSD 13/14/15 —
  # so one binary per arch, no per-major split.
  binaries-freebsd:
    name: Binary (freebsd-${{ matrix.arch }})
    needs: verify-ci
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            vm_arch: x86_64
          - arch: arm64
            vm_arch: aarch64

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build the static release binary in a FreeBSD VM
        uses: vmactions/freebsd-vm@77ed28d336d03fe19a3f4f7266c1d2c4714dd79d # v1
        with:
          release: '14.2'
          arch: ${{ matrix.vm_arch }}
          usesh: true
          prepare: |
            pkg upgrade -y
            pkg install -y cmake ninja git
          run: |
            cmake -S . -B build -G Ninja \
              -D CMAKE_BUILD_TYPE=Release -D BUILD_TESTING=OFF -D REFLECTOR_STATIC=ON -D REFLECTOR_STRIP=ON
            cmake --build build --target reflector_app
            file build/reflector
            file build/reflector | grep -q 'statically linked' \
              || { echo "::error::reflector is not statically linked"; exit 1; }
            mkdir -p dist
            cp build/reflector "dist/reflector-${{ github.ref_name }}-freebsd-${{ matrix.arch }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: reflector-freebsd-${{ matrix.arch }}
          path: dist/reflector-${{ github.ref_name }}-freebsd-${{ matrix.arch }}
          if-no-files-found: error

  # Each arch builds on its own native runner (no emulation), pushes by digest, and the manifest job
  # stitches the digests into one multi-arch tag.
  image:
    name: Image (${{ matrix.arch }})
    needs: verify-ci
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          # armv7/armv5 have no native runner; they cross-compile on the amd64 runner via the Dockerfile (no QEMU).
          - arch: armv7
            runner: ubuntu-24.04
            platform: linux/arm/v7
          - arch: armv5
            runner: ubuntu-24.04
            platform: linux/arm/v5

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/reflector,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}.digest"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Image manifest -> GHCR
    needs: image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/reflector
          # No "latest": that tag belongs to the Rust images; this repo releases version tags on
          # the 0.7.x line only. Omitting it from `tags` is not enough — the default flavor is
          # latest=auto, which adds it on every semver release tag (how 0.7.3 clobbered the Rust
          # latest) — so it must be disabled explicitly.
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push the manifest list
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/reflector
          METADATA: ${{ steps.meta.outputs.json }}
        run: |
          mapfile -t tags < <(jq -r '.tags[]' <<< "$METADATA")
          args=()
          for tag in "${tags[@]}"; do args+=(--tag "$tag"); done
          for f in *.digest; do args+=("${IMAGE}@sha256:${f%.digest}"); done
          docker buildx imagetools create "${args[@]}"

      - name: Inspect
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/reflector
          VERSION: ${{ steps.meta.outputs.version }}
        run: docker buildx imagetools inspect "${IMAGE}:${VERSION}"

  release:
    name: GitHub release
    needs: [binaries, binaries-freebsd, manifest]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          pattern: reflector-*
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum reflector-* | tee SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: |
            dist/reflector-*
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
