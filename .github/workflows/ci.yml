name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Unit (${{ matrix.variant }} ${{ matrix.build_type }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        variant: [linux-amd64, linux-arm64, macos-arm64]
        include:
          - variant: linux-amd64
            runner: ubuntu-24.04
            platform: linux
            cc: gcc-14
            cxx: g++-14
          - variant: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux
            cc: gcc-14
            cxx: g++-14
          - variant: macos-arm64
            runner: macos-15
            platform: macos
            cc: clang
            cxx: clang++

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            g++-14 \
            gcc-14 \
            ninja-build

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew list ninja >/dev/null 2>&1 || brew install ninja

      - name: Show toolchain
        run: |
          cmake --version
          ninja --version
          "${CXX}" --version
        env:
          CXX: ${{ matrix.cxx }}

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -D CMAKE_BUILD_TYPE=${{ matrix.build_type }}
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Build
        run: cmake --build build

      # Run under sudo so the RequiresRoot tests (loopback capture, veth/feth pairs needing
      # CAP_NET_RAW/CAP_NET_ADMIN or bpf + root) run instead of skipping. Each fixture probes its
      # operation and GTEST_SKIPs where unavailable, so this is safe on every platform.
      - name: Run unit tests
        run: sudo ctest --test-dir build --output-on-failure

  docker-e2e:
    name: Docker e2e
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build reflector image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: reflector:e2e
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run e2e
        run: python3 e2e/run.py --skip-build

  valgrind-unit:
    name: Valgrind unit
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            g++-14 \
            gcc-14 \
            ninja-build \
            valgrind

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -D CMAKE_BUILD_TYPE=Debug \
            -D REFLECTOR_SANITIZE=OFF
        env:
          CC: gcc-14
          CXX: g++-14

      - name: Build test binary
        run: cmake --build build --target reflector_test

      # The whole unit binary under Valgrind memcheck, sudo so the RequiresRoot tests run too.
      # --error-exitcode=1 fails the job on any leak or memcheck error. No --track-fds: the unit tests
      # intentionally open/close/probe fds (fd-leak tracking belongs in Valgrind.E2E, the real daemon).
      - name: Run unit suite under Valgrind memcheck
        run: |
          sudo valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=definite,indirect,possible \
            --num-callers=30 \
            --error-exitcode=1 \
            ./build/tests/reflector_test

  valgrind-e2e:
    name: Valgrind e2e
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime-valgrind image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-valgrind
          tags: reflector:e2e-valgrind
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The e2e suite with the reflector under memcheck; --valgrind makes run.py SIGTERM the daemon per
      # case and fail on any leak, leaked fd, or memcheck error. --skip-build reuses the image built above.
      - name: Run e2e under Valgrind memcheck
        run: python3 e2e/run.py --valgrind --skip-build
