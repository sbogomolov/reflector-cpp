name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Unit (${{ matrix.variant }} ${{ matrix.build_type }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        variant: [linux-amd64, linux-arm64, linux-armv7, linux-armv5, macos-arm64]
        include:
          - variant: linux-amd64
            runner: ubuntu-24.04
            platform: linux
            cc: gcc-14
            cxx: g++-14
          - variant: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux
            cc: gcc-14
            cxx: g++-14
          # No native 32-bit ARM runner exists (Graviton can't run AArch32), so the armv7/armv5 entries
          # cross-compile on the amd64 runner and run the suite through qemu-arm-static:
          # CMAKE_CROSSCOMPILING_EMULATOR routes both gtest_discover_tests and ctest through QEMU. Static
          # + no sanitizers so QEMU needs no target sysroot. `crosscompile` drops sudo (see the test
          # step). armv7 = armhf (hard-float, gnueabihf); armv5 = armel (soft-float, gnueabi, EN7562 boxes).
          - variant: linux-armv7
            runner: ubuntu-24.04
            platform: linux
            cc: arm-linux-gnueabihf-gcc-14
            cxx: arm-linux-gnueabihf-g++-14
            crosscompile: true
            cross_packages: crossbuild-essential-armhf g++-14-arm-linux-gnueabihf gcc-14-arm-linux-gnueabihf qemu-user-static
            cmake_args: -D CMAKE_SYSTEM_NAME=Linux -D CMAKE_SYSTEM_PROCESSOR=arm -D CMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/qemu-arm-static
          - variant: linux-armv5
            runner: ubuntu-24.04
            platform: linux
            cc: arm-linux-gnueabi-gcc-14
            cxx: arm-linux-gnueabi-g++-14
            crosscompile: true
            cross_packages: crossbuild-essential-armel g++-14-arm-linux-gnueabi gcc-14-arm-linux-gnueabi qemu-user-static
            cmake_args: -D CMAKE_SYSTEM_NAME=Linux -D CMAKE_SYSTEM_PROCESSOR=arm -D CMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/qemu-arm-static
          - variant: macos-arm64
            runner: macos-15
            platform: macos
            cc: clang
            cxx: clang++

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            g++-14 \
            gcc-14 \
            ninja-build \
            ${{ matrix.cross_packages }}

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew list ninja >/dev/null 2>&1 || brew install ninja

      - name: Show toolchain
        run: |
          cmake --version
          ninja --version
          "${CXX}" --version
        env:
          CXX: ${{ matrix.cxx }}

      # Release is the static config we ship (REFLECTOR_STATIC); Debug stays dynamic so it can carry
      # ASan/UBSan — the two are mutually exclusive. macOS has no static libSystem, so it is never
      # static (its Debug keeps the sanitizers, its Release is plain dynamic). The cross lanes run under
      # qemu-user with no target sysroot, so they build static (no runtime libs to find) and unsanitized
      # (no target ASan/UBSan runtime) in both configs.
      - name: Configure
        run: |
          if [ "${{ matrix.build_type }}" = Release ]; then static=ON; sanitize=OFF; else static=OFF; sanitize=ON; fi
          if [ "${{ matrix.platform }}" = macos ]; then static=OFF; fi
          if [ "${{ matrix.crosscompile }}" = true ]; then static=ON; sanitize=OFF; fi
          cmake -S . -B build -G Ninja \
            -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -D REFLECTOR_STATIC=$static \
            -D REFLECTOR_SANITIZE=$sanitize \
            ${{ matrix.cmake_args }}
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Build
        run: cmake --build build

      # Native lanes run under sudo so the RequiresRoot tests (loopback capture, veth/feth pairs needing
      # CAP_NET_RAW/CAP_NET_ADMIN or bpf + root) run instead of skipping; each fixture probes its operation
      # and GTEST_SKIPs where unavailable. The cross (armv7) lane runs without sudo: under user-mode QEMU
      # those privileged operations aren't viable, so the fixtures self-skip (raw-socket I/O stays covered
      # by the native lanes).
      - name: Run unit tests
        run: |
          if [ "${{ matrix.crosscompile }}" = "true" ]; then
            ctest --test-dir build --output-on-failure
          else
            sudo ctest --test-dir build --output-on-failure
          fi

  docker-e2e:
    name: Docker e2e
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build reflector image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: reflector:e2e
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run e2e
        run: python3 e2e/run.py --skip-build

  valgrind-unit:
    name: Valgrind unit
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            g++-14 \
            gcc-14 \
            ninja-build \
            valgrind

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -D CMAKE_BUILD_TYPE=Debug \
            -D REFLECTOR_SANITIZE=OFF
        env:
          CC: gcc-14
          CXX: g++-14

      - name: Build test binary
        run: cmake --build build --target reflector_test

      # The whole unit binary under Valgrind memcheck, sudo so the RequiresRoot tests run too.
      # --error-exitcode=1 fails the job on any leak or memcheck error. No --track-fds: the unit tests
      # intentionally open/close/probe fds (fd-leak tracking belongs in Valgrind.E2E, the real daemon).
      - name: Run unit suite under Valgrind memcheck
        run: |
          sudo valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=definite,indirect,possible \
            --num-callers=30 \
            --error-exitcode=1 \
            ./build/tests/reflector_test

  valgrind-e2e:
    name: Valgrind e2e
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime-valgrind image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-valgrind
          tags: reflector:e2e-valgrind
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The e2e suite with the reflector under memcheck; --valgrind makes run.py SIGTERM the daemon per
      # case and fail on any leak, leaked fd, or memcheck error. --skip-build reuses the image built above.
      - name: Run e2e under Valgrind memcheck
        run: python3 e2e/run.py --valgrind --skip-build
