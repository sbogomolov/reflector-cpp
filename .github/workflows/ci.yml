name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # "Rebase and merge" rewrites the committer, so the commit that lands on main gets a fresh SHA even when
  # its tree (the file snapshot) and parent are identical to the PR head CI already validated -- matching on
  # the commit SHA therefore never skips. This gate matches on the tree instead: on push only, if a
  # pull_request ci.yml run already passed for a commit with the same tree, the build/test result is
  # guaranteed identical, so it skips the heavy jobs below. The gate itself still succeeds, so release.yml's
  # wait for a green ci.yml run on the commit still holds. A merge rebased onto a moved main (different tree)
  # and direct pushes to main match no prior tree, so the full suite runs. The gate runs only on push, so
  # pull_request CI is never delayed by it.
  gate:
    name: Gate (skip if this tree already passed CI)
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Decide whether the heavy jobs should run
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.repository }}"
          tree=$(gh api "repos/$repo/git/commits/${{ github.sha }}" --jq '.tree.sha' 2>/dev/null || true)
          if [ -z "$tree" ]; then
            echo "Could not resolve the tree for ${{ github.sha }}; running the full suite."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Distinct head SHAs of recent successful pull_request CI runs, most-recent first (so a just-merged
          # PR matches on the first iteration). The PR head commit stays fetchable after the branch is
          # deleted -- it is retained as refs/pull/<n>/head.
          candidates=$(gh api \
            "repos/$repo/actions/workflows/ci.yml/runs?status=success&event=pull_request&per_page=50" \
            --jq '.workflow_runs[].head_sha' 2>/dev/null | awk 'NF && !seen[$0]++' || true)
          for sha in $candidates; do
            t=$(gh api "repos/$repo/git/commits/$sha" --jq '.tree.sha' 2>/dev/null || true)
            if [ -n "$t" ] && [ "$t" = "$tree" ]; then
              echo "Tree $tree already passed CI via pull-request commit $sha; skipping the heavy jobs."
              echo "run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No prior passing run for tree $tree; running the full suite."
          echo "run=true" >> "$GITHUB_OUTPUT"

  unit:
    name: Unit (${{ matrix.variant }} ${{ matrix.build_type }})
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        variant: [linux-amd64, linux-arm64, linux-armv7, linux-armv5, macos-arm64]
        include:
          - variant: linux-amd64
            runner: ubuntu-24.04
            platform: linux
            cc: gcc-14
            cxx: g++-14
          - variant: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux
            cc: gcc-14
            cxx: g++-14
          # No native 32-bit ARM runner exists (Graviton can't run AArch32), so the armv7/armv5 entries
          # cross-compile on the amd64 runner and run the suite through qemu-arm-static:
          # CMAKE_CROSSCOMPILING_EMULATOR routes both gtest_discover_tests and ctest through QEMU. Static
          # + no sanitizers so QEMU needs no target sysroot. `crosscompile` drops sudo (see the test
          # step). armv7 = armhf (hard-float, gnueabihf); armv5 = armel (soft-float, gnueabi, EN7562 boxes).
          - variant: linux-armv7
            runner: ubuntu-24.04
            platform: linux
            cc: arm-linux-gnueabihf-gcc-14
            cxx: arm-linux-gnueabihf-g++-14
            crosscompile: true
            cross_packages: crossbuild-essential-armhf g++-14-arm-linux-gnueabihf gcc-14-arm-linux-gnueabihf qemu-user-static
            cmake_args: -D CMAKE_SYSTEM_NAME=Linux -D CMAKE_SYSTEM_PROCESSOR=arm -D CMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/qemu-arm-static
          - variant: linux-armv5
            runner: ubuntu-24.04
            platform: linux
            cc: arm-linux-gnueabi-gcc-14
            cxx: arm-linux-gnueabi-g++-14
            crosscompile: true
            cross_packages: crossbuild-essential-armel g++-14-arm-linux-gnueabi gcc-14-arm-linux-gnueabi qemu-user-static
            cmake_args: -D CMAKE_SYSTEM_NAME=Linux -D CMAKE_SYSTEM_PROCESSOR=arm -D CMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/qemu-arm-static
          - variant: macos-arm64
            runner: macos-15
            platform: macos
            cc: clang
            cxx: clang++

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            g++-14 \
            gcc-14 \
            ninja-build \
            ${{ matrix.cross_packages }}

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew list ninja >/dev/null 2>&1 || brew install ninja

      - name: Show toolchain
        run: |
          cmake --version
          ninja --version
          "${CXX}" --version
        env:
          CXX: ${{ matrix.cxx }}

      # Release is the static config we ship (REFLECTOR_STATIC); Debug stays dynamic so it can carry
      # ASan/UBSan — the two are mutually exclusive. macOS has no static libSystem, so it is never
      # static (its Debug keeps the sanitizers, its Release is plain dynamic). The cross lanes run under
      # qemu-user with no target sysroot, so they build static (no runtime libs to find) and unsanitized
      # (no target ASan/UBSan runtime) in both configs.
      - name: Configure
        run: |
          if [ "${{ matrix.build_type }}" = Release ]; then static=ON; sanitize=OFF; else static=OFF; sanitize=ON; fi
          if [ "${{ matrix.platform }}" = macos ]; then static=OFF; fi
          if [ "${{ matrix.crosscompile }}" = true ]; then static=ON; sanitize=OFF; fi
          cmake -S . -B build -G Ninja \
            -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -D REFLECTOR_STATIC=$static \
            -D REFLECTOR_SANITIZE=$sanitize \
            ${{ matrix.cmake_args }}
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Build
        run: cmake --build build

      # macOS (like FreeBSD) only binds explicitly-assigned loopback addresses, so the two DIAL tests
      # that bind 127.0.0.2 self-skip. Add the alias so they run here too (Linux makes all of 127/8
      # bindable, so it needs nothing). Best-effort — the tests just skip again if it doesn't take.
      - name: Add 127.0.0.2 loopback alias for the DIAL tests (macOS)
        if: matrix.platform == 'macos'
        run: sudo ifconfig lo0 alias 127.0.0.2 || true

      # Native lanes run under sudo so the RequiresRoot tests (loopback capture, veth/feth pairs needing
      # CAP_NET_RAW/CAP_NET_ADMIN or bpf + root) run instead of skipping; each fixture probes its operation
      # and GTEST_SKIPs where unavailable. The cross (armv7) lane runs without sudo: under user-mode QEMU
      # those privileged operations aren't viable, so the fixtures self-skip (raw-socket I/O stays covered
      # by the native lanes).
      - name: Run unit tests
        run: |
          if [ "${{ matrix.crosscompile }}" = "true" ]; then
            ctest --test-dir build --output-on-failure
          else
            sudo ctest --test-dir build --output-on-failure
          fi

  freebsd:
    name: Unit (freebsd-amd64 ${{ matrix.build_type }})
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # FreeBSD shares its BSD platform path (kqueue, BPF, route sockets, getifaddrs) with macOS but needs
      # a real FreeBSD kernel to build and test — Docker can't provide one. vmactions boots a FreeBSD VM via
      # QEMU inside the Linux runner (same spirit as the armv7/armv5-under-QEMU lanes above) and runs the
      # script inside it. The VM runs as root, so the RequiresRoot tests (BPF capture, epair pairs) run
      # instead of skipping; each fixture self-skips where its operation isn't available.
      - name: Build and test in a FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: '14.2'  # 14.x base ships clang/libc++ >= 18 (std::println/format/expected); OPNsense 25.x tracks 14.3
          usesh: true
          prepare: |
            # Upgrade the image's pre-installed packages before installing ours: the base VM ships an
            # older pcre2 than the git in the current pkg catalogue links against, so a freshly
            # pkg-installed git fails to load ("ld-elf.so.1: ... PCRE2_10.47 ... not defined"). That
            # makes cmake's find_package(Git) read an empty version and abort FetchContent. Upgrading
            # first brings the shared libs in line with what we install.
            pkg upgrade -y
            pkg install -y cmake ninja git
          run: |
            cmake --version
            c++ --version
            # Release is the static config we ship (REFLECTOR_STATIC); Debug stays dynamic so it can
            # carry ASan/UBSan (the two are mutually exclusive). Same split as the Linux lanes.
            if [ "${{ matrix.build_type }}" = Release ]; then static=ON; sanitize=OFF; else static=OFF; sanitize=ON; fi
            cmake -S . -B build -G Ninja -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -D REFLECTOR_STATIC=$static -D REFLECTOR_SANITIZE=$sanitize
            cmake --build build
            # FreeBSD (like macOS) only binds explicitly-assigned loopback addresses, so add 127.0.0.2
            # for the two DIAL tests; best-effort — they skip again if it doesn't take.
            ifconfig lo0 alias 127.0.0.2/32 || true
            ctest --test-dir build --output-on-failure

  docker-e2e:
    name: Docker e2e
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build reflector image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: reflector:e2e
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run e2e
        run: python3 e2e/run.py --skip-build

  valgrind-unit:
    name: Valgrind unit
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            g++-14 \
            gcc-14 \
            ninja-build \
            valgrind

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -D CMAKE_BUILD_TYPE=Debug \
            -D REFLECTOR_SANITIZE=OFF
        env:
          CC: gcc-14
          CXX: g++-14

      - name: Build test binary
        run: cmake --build build --target reflector_test

      # The whole unit binary under Valgrind memcheck, sudo so the RequiresRoot tests run too.
      # --error-exitcode=1 fails the job on any leak or memcheck error. No --track-fds: the unit tests
      # intentionally open/close/probe fds (fd-leak tracking belongs in Valgrind.E2E, the real daemon).
      - name: Run unit suite under Valgrind memcheck
        run: |
          sudo valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=definite,indirect,possible \
            --num-callers=30 \
            --error-exitcode=1 \
            ./build/tests/reflector_test

  valgrind-e2e:
    name: Valgrind e2e
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime-valgrind image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-valgrind
          tags: reflector:e2e-valgrind
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The e2e suite with the reflector under memcheck; --valgrind makes run.py SIGTERM the daemon per
      # case and fail on any leak, leaked fd, or memcheck error. --skip-build reuses the image built above.
      - name: Run e2e under Valgrind memcheck
        run: python3 e2e/run.py --valgrind --skip-build
